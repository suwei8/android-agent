name: Android Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "是否发布到 GitHub Releases"
        type: boolean
        default: false
      release_tag:
        description: "发布标签，例如 v1.0.0"
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

env:
  APK_NAME: mobile-agent-debug.apk

jobs:
  assemble-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug

      - name: Prepare Release Files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/${APK_NAME}"
          sha256sum "dist/${APK_NAME}" > "dist/${APK_NAME}.sha256"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*
          if-no-files-found: error

  publish-release:
    needs: assemble-debug
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    runs-on: ubuntu-latest

    steps:
      - name: Validate Release Tag
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -z "${INPUT_TAG}" ]]; then
            echo "workflow_dispatch 发布时必须提供 release_tag"
            exit 1
          fi

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist

      - name: Resolve Release Metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${INPUT_TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/${{ env.APK_NAME }}
            dist/${{ env.APK_NAME }}.sha256
